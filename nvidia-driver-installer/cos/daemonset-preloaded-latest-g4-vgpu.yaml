apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-driver-installer
  namespace: kube-system
  labels:
    k8s-app: nvidia-driver-installer
spec:
  selector:
    matchLabels:
      k8s-app: nvidia-driver-installer
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: nvidia-driver-installer
        k8s-app: nvidia-driver-installer
    spec:
      priorityClassName: system-node-critical
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              # Targets nodes with GPUs
              - key: cloud.google.com/gke-accelerator
                operator: Exists
              # Only runs if GKE hasn't already managed the driver
              - key: cloud.google.com/gke-gpu-driver-version
                operator: DoesNotExist
      tolerations:
      - operator: "Exists"
      hostNetwork: true
      hostPID: true
      volumes:
      - name: dev
        hostPath:
          path: /dev
      - name: vulkan-icd-mount
        hostPath:
          path: /home/kubernetes/bin/nvidia/vulkan/icd.d
      - name: nvidia-install-dir-host
        hostPath:
          path: /home/kubernetes/bin/nvidia
      - name: root-mount
        hostPath:
          path: /
      - name: cos-tools
        hostPath:
          path: /var/lib/cos-tools
      - name: nvidia-config
        hostPath:
          path: /etc/nvidia
      # --- NEW TARGETED MOUNTS ---
      - name: host-lib64
        hostPath:
          path: /lib64
      - name: host-usr-lib64
        hostPath:
          path: /usr/lib64
      initContainers:
      - image: "cos-nvidia-installer:fixed"
        imagePullPolicy: IfNotPresent
        name: nvidia-driver-installer
        resources:
          requests:
            cpu: 150m
        securityContext:
          privileged: true
        env:
          - name: NVIDIA_INSTALL_DIR_HOST
            value: /home/kubernetes/bin/nvidia
          - name: NVIDIA_INSTALL_DIR_CONTAINER
            value: /usr/local/nvidia
          - name: VULKAN_ICD_DIR_HOST
            value: /home/kubernetes/bin/nvidia/vulkan/icd.d
          - name: VULKAN_ICD_DIR_CONTAINER
            value: /etc/vulkan/icd.d
          - name: ROOT_MOUNT_DIR
            value: /root
          - name: COS_TOOLS_DIR_HOST
            value: /var/lib/cos-tools
          - name: COS_TOOLS_DIR_CONTAINER
            value: /build/cos-tools
        volumeMounts:
        - name: nvidia-install-dir-host
          mountPath: /usr/local/nvidia
        - name: vulkan-icd-mount
          mountPath: /etc/vulkan/icd.d
        - name: dev
          mountPath: /dev
        - name: root-mount
          mountPath: /root
        - name: cos-tools
          mountPath: /build/cos-tools
        - name: nvidia-config
          mountPath: /etc/nvidia
        command:
        - bash
        - -c
        - |
          set -e
          echo "Checking for existing GPU driver modules"
          if lsmod | grep nvidia; then
            echo "GPU driver is already installed, skipping installation"
            exit 0
          else
            echo "No GPU driver module detected, installing now"
            /cos-gpu-installer install --version=latest
            chmod 755 /root/home/kubernetes/bin/nvidia
          fi
      containers:
      - image: "gcr.io/ankitjoju-gke-dev/nvidia_persistenced_installer@sha256:TBD" 
        name: "nvidia-daemon-installer"
        securityContext:
          privileged: true
        env:
          - name: LD_LIBRARY_PATH
            value: /usr/local/nvidia/lib64
          - name: NVIDIA_INSTALL_DIR_HOST
            value: /home/kubernetes/bin/nvidia
          - name: HOST_LIB_MOUNT_DIR
            value: /host-libs
        volumeMounts:
        - name: nvidia-install-dir-host
          mountPath: /usr/local/nvidia
        - name: nvidia-config
          mountPath: /etc/nvidia
        - name: dev
          mountPath: /dev
        - name: host-lib64
          mountPath: /host-libs/lib64
          readOnly: true
        - name: host-usr-lib64
          mountPath: /host-libs/usr/lib64
          readOnly: true
      - image: "gke.gcr.io/pause:3.8"
        name: pause